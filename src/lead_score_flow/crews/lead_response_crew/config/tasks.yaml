send_followup_email:
  description: >
    Compose personalized follow-up emails for candidates who applied to a specific job.

    You will use the candidate's name, bio, and whether the company approved the candidate to generate the email.
    If the candidate is approved, ask them for their availability for a Zoom call in the upcoming days.
    If not, send a polite rejection email.

    CANDIDATE DETAILS
    -----------------
    Candidate ID: {candidate_id}
    Name: {name}
    Bio:
    {bio}

    CANDIDATE APPROVED: {candidate_approved}

    ADDITIONAL INSTRUCTIONS
    -----------------------
    - If the candidate is approved, ask for their availability for a Zoom call within the next few days.
    - If the candidate is not approved, send a polite rejection email, acknowledging their effort in applying and appreciating their time.

  expected_output: >
    A personalized email based on the candidate's information. It should be professional and respectful, 
    either inviting them for a Zoom call or letting them know we are pursuing other candidates.
  agent: email_followup_agent
